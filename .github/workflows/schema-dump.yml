# Regenerates docs/schema.sql (the flattened current-state DB schema) from the live database.
# Runs pg_dump in the cloud, so nothing needs to be installed locally.
#
# Triggers:
#   - push to main touching migrations/**  → the moment the schema actually changes
#   - workflow_dispatch                     → a manual "Run" button in the Actions tab
#   - schedule (weekly)                     → safety net that catches out-of-band / dashboard
#                                             changes not captured in a migration file
#
# One-time setup required:
#   1. Repo secret SUPABASE_DB_URL = the prod Postgres connection string
#      (Supabase dashboard → Project Settings → Database → Connection string → "Session pooler",
#      port 5432, with the password filled in and percent-encoded). Prefer the least-privilege
#      read-only role if it can read the catalog; otherwise the standard postgres connection.
#   2. Repo secret SCHEMA_DUMP_TOKEN = a fine-grained PAT (repo-scoped, Contents: read+write)
#      owned by an account on the branch-protection BYPASS list. Since main became a protected
#      branch (2026-07-08, going public), the default GITHUB_TOKEN / github-actions[bot] can't
#      push to main — its commit is rejected with "must be made through a pull request". The
#      checkout below authenticates git as the PAT owner (bypassed) so the auto-commit lands.
#   GitHub: Settings → Secrets and variables → Actions → New repository secret.
#
# See decisions.md 2026-07-07 "Automated schema.sql via CI" + 2026-07-08 "Branch protection"
# and operations.md §3.

name: Dump DB schema

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
  workflow_dispatch: {}
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC — weekly drift safety net

# Allow the workflow to commit the regenerated file back to the repo.
permissions:
  contents: write

# Never run two dumps at once; cancel an in-flight run if a newer one starts.
concurrency:
  group: schema-dump
  cancel-in-progress: true

jobs:
  dump-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Persist this token as the git credential so the push in the final step
          # authenticates as the PAT owner (on the branch-protection bypass list),
          # not the blocked github-actions[bot].
          token: ${{ secrets.SCHEMA_DUMP_TOKEN }}

      - name: Install pg_dump (PostgreSQL 17 client)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          # ubuntu-latest ships pg_dump 16, which refuses to dump a v17+ server.
          # Force the freshly-installed v17 binary to the front of PATH for later steps.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Confirm pg_dump version
        run: pg_dump --version   # expect 17.x — must be >= the Supabase server version

      - name: Dump public schema
        run: |
          pg_dump \
            --schema-only \
            --schema=public \
            --no-owner \
            "${{ secrets.SUPABASE_DB_URL }}" \
            -f docs/schema.sql

      - name: Commit if the schema changed
        run: |
          if git diff --quiet -- docs/schema.sql; then
            echo "schema.sql unchanged — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/schema.sql
            git commit -m "chore(docs): regenerate schema.sql [skip ci]"
            git push
          fi
